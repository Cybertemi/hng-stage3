services:

  nextcloud:
    image: kefaslungu/hng-nextcloud:latest
    container_name: nextcloud
    restart: unless-stopped
    networks:
      - app-network
    volumes:
      - nextcloud-data:/var/www/html

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - app-network
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - HNG-nginx-logs:/var/log/nginx
    depends_on:
      - nextcloud

  detector:
    build:
      context: ./detector
      dockerfile: Dockerfile
    container_name: detector
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
    volumes:
      - HNG-nginx-logs:/var/log/nginx:ro
      - detector-logs:/var/log/detector
      - ./detector/config.yaml:/app/config.yaml:ro
    depends_on:
      - nginx

networks:
  app-network:
    driver: bridge

volumes:
  nextcloud-data:
  HNG-nginx-logs:
    name: HNG-nginx-logs
  detector-logs:


