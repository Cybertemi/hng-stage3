services:

  nextcloud:
    image: kefaslungu/hng-nextcloud:latest
    container_name: nextcloud
    restart: unless-stopped
    networks:
      - app-network
    volumes:
      - nextcloud-data:/var/www/html

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: unless-stopped
    ports:
      - "80:80"
    networks:
      - app-network
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - HNG-nginx-logs:/var/log/nginx
    depends_on:
      - nextcloud

networks:
  app-network:
    driver: bridge

volumes:
  nextcloud-data:
  HNG-nginx-logs:
    name: HNG-nginx-logs
